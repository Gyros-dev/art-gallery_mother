<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Галерея — Анна Векслер</title>
  <meta name="description" content="Гобелены и текстильные коллажи Анны Векслер.">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="256x256" href="../assets/favicon-256.png">
  <link rel="apple-touch-icon" href="../assets/favicon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/gallery.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <main class="gallery-page">
    <div class="gallery-filters" data-filters></div>

    <div class="coverflow-view" data-coverflow>
      <div class="stage">
        <button class="nav-arrow prev" aria-label="Предыдущая"><img src="../assets/arrow-left.png" alt=""></button>

        <div class="cf-side left" aria-label="Предыдущая работа"><img alt=""></div>

        <div class="cf-center" title="Открыть во весь экран">
          <div class="stack">
            <div class="layer a"></div>
            <div class="layer b"></div>
          </div>
        </div>

        <div class="cf-side right" aria-label="Следующая работа"><img alt=""></div>

        <button class="nav-arrow next" aria-label="Следующая"><img src="../assets/arrow-right.png" alt=""></button>
      </div>

      <div class="art-info">
        <span class="counter">—</span>
        <h2></h2>
        <p class="meta"></p>
      </div>

      <div class="filmstrip" data-filmstrip><div class="filmstrip-inner"></div></div>
    </div>

    <div class="works-grid" data-grid hidden></div>
  </main>

  <div class="lightbox" aria-hidden="true">
    <button class="lb-x" aria-label="Закрыть">✕</button>
    <button class="lb-prev" aria-label="Предыдущая работа"><img src="../assets/arrow-left.png" alt=""></button>
    <button class="lb-next" aria-label="Следующая работа"><img src="../assets/arrow-right.png" alt=""></button>
    <img class="lb-image" alt="">
    <div class="lb-multi" style="display:none"></div>
    <div class="lb-text" style="display:none"></div>
    <p class="lb-caption"></p>
  </div>

  <script src="../js/common.js"></script>
  <script src="../js/gallery.js"></script>
</body>
</html>
